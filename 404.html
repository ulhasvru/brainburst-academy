<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainBurst Academy – Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #FFF9F0;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .card {
      background: white; border-radius: 32px; padding: 52px 40px;
      box-shadow: 0 12px 0 #FFD93D; border: 3px solid #FFD93D;
      max-width: 480px; width: 100%;
    }
    .emoji { font-size: 80px; display: block; margin-bottom: 16px; }
    h1 { font-family: 'Fredoka One', cursive; font-size: 2.2rem; color: #FF6B6B; margin-bottom: 10px; }
    p { color: #4A4A6A; font-size: 1rem; font-weight: 700; margin-bottom: 28px; line-height: 1.6; }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #FF6B6B, #FF9F1C);
      color: white; text-decoration: none;
      padding: 16px 40px; border-radius: 50px;
      font-family: 'Fredoka One', cursive; font-size: 1.2rem;
      box-shadow: 0 6px 0 #C0392B; transition: transform 0.15s, box-shadow 0.15s;
    }
    a:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #C0392B; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🦁</span>
    <h1>Oops! Page Not Found</h1>
    <p>Looks like this page went on a little adventure!<br>Let's head back to BrainBurst Academy.</p>
    <a href="index.html">🏠 Go Back Home</a>
  </div>
</body>
</html>
