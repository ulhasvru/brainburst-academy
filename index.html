<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌟 BrainBurst Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Basic backup styles in case style.css is missing */
    body { font-family: 'Nunito', sans-serif; background: #f0f4f8; margin: 0; }
    .screen { display: none; padding: 20px; }
    .screen.active { display: block; }
    .btn-go, .hdr-btn { cursor: pointer; padding: 10px 20px; border-radius: 8px; border: none; background: #FF9F1C; color: white; font-weight: bold; }
    .subjects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    .subj-card { background: white; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<div id="toast" style="display:none; position:fixed; top:20px; right:20px; background:#333; color:white; padding:10px 20px; border-radius:8px; z-index:1000;"></div>

<div class="screen active" id="screen-welcome">
  <div style="text-align:center; margin-top:100px;">
    <h1>🦁 BrainBurst Academy</h1>
    <input type="text" id="student-name-input" placeholder="Your Name?" style="padding:10px; border-radius:8px; border:1px solid #ccc;">
    <p id="name-error" style="color:red; display:none;">Please enter a name!</p>
    <button class="btn-go" onclick="startApp()">🚀 Start!</button>
  </div>
</div>

<div class="screen" id="screen-home">
  <div style="display:flex; justify-content:space-between; align-items:center; background:white; padding:10px; border-radius:12px;">
    <h2>Hi, <span id="greeting-name"></span>!</h2>
    <div>
      <button class="hdr-btn" style="background:#6366F1;" onclick="showAdminDashboard()">📊 Logs</button>
      <button class="hdr-btn" onclick="showScreen('screen-welcome')">Logout</button>
    </div>
  </div>
  <div class="subjects-grid" id="subjects-grid"></div>
</div>

<div class="screen" id="screen-admin">
  <button class="hdr-btn" onclick="showScreen('screen-home')">🏠 Back</button>
  <h2>🎓 Student Performance Logs</h2>
  <input type="text" id="admin-search-input" onkeyup="filterLogs()" placeholder="🔍 Search name..." style="width:100%; padding:10px; margin-bottom:10px;">
  <table style="width:100%; background:white; border-collapse:collapse;">
    <thead style="background:#eee;">
      <tr><th style="padding:10px;">Name</th><th>Subject</th><th>Score</th><th>Status</th><th>Date</th></tr>
    </thead>
    <tbody id="admin-table-body"></tbody>
  </table>
  <div style="margin-top:10px; display:flex; justify-content:space-between;">
    <button onclick="clearLogs()" style="color:red; border:none; background:none; cursor:pointer;">Clear All</button>
    <div id="log-count">0 records</div>
  </div>
</div>

<div class="screen" id="screen-quiz">
    <h2 id="quiz-title">Quiz</h2>
    <div id="q-text" style="font-size:1.2rem; margin-bottom:20px;"></div>
    <div id="q-opts"></div>
    <button id="next-btn" onclick="nextQuestion()" style="display:none; margin-top:20px;" class="btn-go">Next →</button>
</div>

<div class="screen" id="screen-result">
    <div style="text-align:center;">
        <h1 id="res-pct" style="font-size:3rem;">0%</h1>
        <p id="res-msg">Well done!</p>
        <button class="btn-go" onclick="showScreen('screen-home')">🏠 Back Home</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
